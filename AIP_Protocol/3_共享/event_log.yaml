# 事件日志

此文件记录 AIP 协议执行过程中的所有重要事件。

## 格式

```yaml
- timestamp: "2026-04-13T10:00:00Z"  # ISO 8601
  task_id: "T20260413_001"
  event_type: "task_started|task_completed|task_blocked|milestone_reached"
  assignee: "AI Assistant|Human|Team"
  duration_minutes: 45
  files_touched:
    - "AIP_Protocol/0_决策/README.md"
  notes: "简要描述"
```

## 事件类型

| 类型 | 说明 |
|------|------|
| `task_started` | 任务开始执行 |
| `task_completed` | 任务成功完成 |
| `task_blocked` | 任务被阻塞 |
| `milestone_reached` | 达成里程碑 |
| `decision_made` | 做出决策 |
| `protocol_updated` | 协议本身更新 |

