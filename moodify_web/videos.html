<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频 | Moodify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/videos.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <a href="index.html" class="nav-link">情绪潮汐</a>
        <a href="playlist.html" class="nav-link">歌单</a>
        <a href="videos.html" class="nav-link active">视频</a>
        <a href="voice.html" class="nav-link">品牌声音</a>
    </nav>

    <!-- Main Content -->
    <main class="videos-page">
        <!-- Header -->
        <header class="page-header">
            <h1 class="page-title">视频</h1>
            <p class="page-subtitle">影像的情绪，声音的故事</p>
        </header>

        <!-- Video Folders -->
        <section class="folders-section">
            <div class="section-toolbar">
                <h2 class="section-title">文件夹</h2>
                <button class="btn-create" id="btn-create-folder">
                    <span>+</span> 新建文件夹
                </button>
            </div>

            <div class="folders-grid" id="folders-grid">
                <!-- 动态加载文件夹 -->
            </div>
        </section>

        <!-- All Videos -->
        <section class="videos-section">
            <div class="section-toolbar">
                <h2 class="section-title">所有视频</h2>
                <button class="btn-scan" id="btn-scan-videos">
                    <span>⟳</span> 扫描视频
                </button>
            </div>

            <div class="videos-grid" id="videos-grid">
                <!-- 视频列表 -->
            </div>
        </section>
    </main>

    <!-- Video Player Modal -->
    <div class="modal modal-video" id="video-modal">
        <div class="modal-content video-player">
            <div class="video-header">
                <h3 id="video-title">视频标题</h3>
                <button class="btn-close" id="btn-close-video">×</button>
            </div>
            <div class="video-container">
                <video id="video-player" controls>
                    <source id="video-source" type="video/mp4">
                </video>
            </div>
        </div>
    </div>

    <!-- Create Folder Modal -->
    <div class="modal" id="create-folder-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新建文件夹</h3>
                <button class="btn-close" id="btn-close-folder-modal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>文件夹名称</label>
                    <input type="text" id="folder-name" placeholder="输入文件夹名称...">
                </div>
                <div class="form-group">
                    <label>描述（可选）</label>
                    <textarea id="folder-desc" placeholder="描述这个文件夹的内容..."></textarea>
                </div>
                <div class="form-group">
                    <label>图标</label>
                    <div class="icon-picker">
                        <button class="icon-option selected" data-icon="📁">📁</button>
                        <button class="icon-option" data-icon="🎬">🎬</button>
                        <button class="icon-option" data-icon="🎵">🎵</button>
                        <button class="icon-option" data-icon="🌊">🌊</button>
                        <button class="icon-option" data-icon="✨">✨</button>
                        <button class="icon-option" data-icon="💫">💫</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="btn-cancel-folder">取消</button>
                <button class="btn-confirm" id="btn-confirm-folder">创建</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-message"></span>
    </div>

    <script>
        // API 配置
        const API_BASE = 'http://127.0.0.1:5000/api';
        const VIDEO_BASE = 'http://127.0.0.1:5000/api/folders';

        // 状态管理
        let folders = [];
        let videos = [];
        let selectedIcon = '📁';
        let currentFolder = null;

        // DOM 元素
        const foldersGrid = document.getElementById('folders-grid');
        const videosGrid = document.getElementById('videos-grid');
        const videoModal = document.getElementById('video-modal');
        const createFolderModal = document.getElementById('create-folder-modal');
        const toast = document.getElementById('toast');

        // 初始化
        async function init() {
            await loadFolders();
            await loadAllVideos();
            setupEventListeners();
        }

        // 加载文件夹
        async function loadFolders() {
            try {
                const response = await fetch(`${API_BASE}/video-folders`);
                const result = await response.json();
                if (result.success) {
                    folders = result.data;
                    renderFolders();
                }
            } catch (error) {
                console.error('加载文件夹失败:', error);
            }
        }

        // 加载所有视频
        async function loadAllVideos() {
            try {
                const response = await fetch(`${API_BASE}/videos/scan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const result = await response.json();
                if (result.success) {
                    videos = result.data;
                    renderVideos();
                }
            } catch (error) {
                console.error('加载视频失败:', error);
            }
        }

        // 渲染文件夹
        function renderFolders() {
            if (folders.length === 0) {
                foldersGrid.innerHTML = `
                    <div class="empty-state">
                        <p>还没有文件夹</p>
                        <p class="hint">点击右上角「新建文件夹」创建第一个文件夹</p>
                    </div>
                `;
                return;
            }

            foldersGrid.innerHTML = folders.map(f => `
                <div class="folder-card" data-name="${f.name}">
                    <div class="folder-icon">${f.cover_icon || '📁'}</div>
                    <div class="folder-info">
                        <h3 class="folder-name">${f.name}</h3>
                        <p class="folder-desc">${f.description || '暂无描述'}</p>
                        <span class="folder-count">${f.video_count || 0} 个视频</span>
                    </div>
                    <div class="folder-actions">
                        <button class="btn-open-folder" data-name="${f.name}" title="打开">
                            <span>→</span>
                        </button>
                        <button class="btn-delete-folder" data-name="${f.name}" title="删除">
                            <span>×</span>
                        </button>
                    </div>
                </div>
            `).join('');

            // 绑定事件
            document.querySelectorAll('.folder-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (!e.target.closest('.folder-actions')) {
                        openFolder(card.dataset.name);
                    }
                });
            });

            document.querySelectorAll('.btn-open-folder').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openFolder(btn.dataset.name);
                });
            });

            document.querySelectorAll('.btn-delete-folder').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteFolder(btn.dataset.name);
                });
            });
        }

        // 渲染视频列表
        function renderVideos() {
            if (videos.length === 0) {
                videosGrid.innerHTML = `
                    <div class="empty-state">
                        <p>没有视频</p>
                        <p class="hint">将视频文件放入 videos 文件夹，然后点击「扫描视频」</p>
                    </div>
                `;
                return;
            }

            videosGrid.innerHTML = videos.map((v, i) => `
                <div class="video-card" data-path="${v.file_path}" data-name="${v.name}">
                    <div class="video-thumb">
                        <div class="thumb-placeholder">
                            <span>▶</span>
                        </div>
                    </div>
                    <div class="video-info">
                        <h4 class="video-name">${v.name}</h4>
                        <div class="video-meta">
                            <span class="video-folder">${v.folder_icon || '📁'} ${v.folder}</span>
                            <span class="video-size">${formatSize(v.size)}</span>
                        </div>
                    </div>
                    <button class="btn-play-video" data-path="${v.file_path}" data-name="${v.name}" title="播放">
                        <span>▶</span>
                    </button>
                </div>
            `).join('');

            // 绑定播放事件
            document.querySelectorAll('.btn-play-video').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playVideo(btn.dataset.path, btn.dataset.name);
                });
            });

            document.querySelectorAll('.video-card').forEach(card => {
                card.addEventListener('dblclick', () => {
                    playVideo(card.dataset.path, card.dataset.name);
                });
            });
        }

        // 打开文件夹
        async function openFolder(folderName) {
            try {
                const response = await fetch(`${API_BASE}/videos/scan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ folder: folderName })
                });
                const result = await response.json();
                if (result.success) {
                    const folderVideos = result.data;
                    currentFolder = folderName;

                    if (folderVideos.length === 0) {
                        videosGrid.innerHTML = `
                            <div class="empty-state">
                                <p>文件夹为空</p>
                                <p class="hint">将视频文件放入 videos/${folderName} 文件夹</p>
                            </div>
                        `;
                    } else {
                        videosGrid.innerHTML = folderVideos.map((v, i) => `
                            <div class="video-card" data-path="${v.file_path}" data-name="${v.name}">
                                <div class="video-thumb">
                                    <div class="thumb-placeholder">
                                        <span>▶</span>
                                    </div>
                                </div>
                                <div class="video-info">
                                    <h4 class="video-name">${v.name}</h4>
                                    <div class="video-meta">
                                        <span class="video-folder">${folderName}</span>
                                        <span class="video-size">${formatSize(v.size)}</span>
                                    </div>
                                </div>
                                <button class="btn-play-video" data-path="${v.file_path}" data-name="${v.name}" title="播放">
                                    <span>▶</span>
                                </button>
                            </div>
                        `).join('');

                        // 绑定播放事件
                        document.querySelectorAll('.btn-play-video').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                playVideo(btn.dataset.path, btn.dataset.name);
                            });
                        });
                    }

                    // 显示返回按钮
                    document.querySelector('.videos-section .section-toolbar').innerHTML = `
                        <div class="section-header">
                            <button class="btn-back-all" id="btn-back-all">← 返回全部视频</button>
                            <h2 class="section-title">${folderName}</h2>
                        </div>
                        <button class="btn-scan" id="btn-scan-videos">
                            <span>⟳</span> 刷新
                        </button>
                    `;

                    document.getElementById('btn-scan-videos').addEventListener('click', () => openFolder(folderName));
                }
            } catch (error) {
                console.error('加载文件夹视频失败:', error);
            }
        }

        // 返回全部视频
        async function backToAllVideos() {
            document.querySelector('.videos-section .section-toolbar').innerHTML = `
                <h2 class="section-title">所有视频</h2>
                <button class="btn-scan" id="btn-scan-videos">
                    <span>⟳</span> 扫描视频
                </button>
            `;
            document.getElementById('btn-scan-videos').addEventListener('click', loadAllVideos);
            currentFolder = null;
            await loadAllVideos();
        }

        // 播放视频
        function playVideo(filePath, name) {
            document.getElementById('video-title').textContent = name;
            document.getElementById('video-source').src = filePath;
            document.getElementById('video-player').load();
            videoModal.classList.add('active');
            document.getElementById('video-player').play();
        }

        // 新建文件夹
        async function createFolder() {
            const name = document.getElementById('folder-name').value.trim();
            const desc = document.getElementById('folder-desc').value.trim();

            if (!name) {
                showToast('请输入文件夹名称');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/video-folders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        description: desc,
                        cover_icon: selectedIcon
                    })
                });
                const result = await response.json();
                if (result.success) {
                    showToast('文件夹创建成功');
                    createFolderModal.classList.remove('active');
                    document.getElementById('folder-name').value = '';
                    document.getElementById('folder-desc').value = '';
                    await loadFolders();
                }
            } catch (error) {
                console.error('创建文件夹失败:', error);
            }
        }

        // 删除文件夹
        async function deleteFolder(folderName) {
            if (!confirm('确定要删除这个文件夹吗？')) return;

            try {
                const response = await fetch(`${API_BASE}/video-folders/${folderName}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.success) {
                    showToast('文件夹已删除');
                    await loadFolders();
                    await loadAllVideos();
                }
            } catch (error) {
                console.error('删除文件夹失败:', error);
            }
        }

        // 工具函数
        function formatSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }

        function showToast(message) {
            const toastEl = document.getElementById('toast');
            toastEl.querySelector('.toast-message').textContent = message;
            toastEl.classList.add('active');
            setTimeout(() => toastEl.classList.remove('active'), 3000);
        }

        // 事件绑定
        function setupEventListeners() {
            // 新建文件夹
            document.getElementById('btn-create-folder').addEventListener('click', () => {
                createFolderModal.classList.add('active');
            });

            // 关闭弹窗
            document.getElementById('btn-close-folder-modal').addEventListener('click', () => {
                createFolderModal.classList.remove('active');
            });
            document.getElementById('btn-cancel-folder').addEventListener('click', () => {
                createFolderModal.classList.remove('active');
            });
            document.getElementById('btn-confirm-folder').addEventListener('click', createFolder);

            // 关闭视频播放器
            document.getElementById('btn-close-video').addEventListener('click', () => {
                document.getElementById('video-player').pause();
                videoModal.classList.remove('active');
            });

            // 扫描视频
            document.getElementById('btn-scan-videos').addEventListener('click', loadAllVideos);

            // 图标选择
            document.querySelectorAll('.icon-option').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedIcon = btn.dataset.icon;
                    document.querySelectorAll('.icon-option').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                });
            });

            // 点击弹窗外部关闭
            videoModal.addEventListener('click', (e) => {
                if (e.target === videoModal) {
                    document.getElementById('video-player').pause();
                    videoModal.classList.remove('active');
                }
            });
            createFolderModal.addEventListener('click', (e) => {
                if (e.target === createFolderModal) createFolderModal.classList.remove('active');
            });
        }

        // 启动
        init();
    </script>
</body>
</html>
