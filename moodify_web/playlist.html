<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌单 | Moodify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/playlist.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <a href="index.html" class="nav-link">情绪潮汐</a>
        <a href="playlist.html" class="nav-link active">歌单</a>
        <a href="videos.html" class="nav-link">视频</a>
        <a href="voice.html" class="nav-link">品牌声音</a>
    </nav>

    <!-- Main Content -->
    <main class="playlist-page">
        <!-- Header -->
        <header class="page-header">
            <h1 class="page-title">歌单</h1>
            <p class="page-subtitle">情绪的容器，音乐的归处</p>
        </header>

        <!-- Playlists Grid -->
        <section class="playlists-section">
            <div class="section-toolbar">
                <h2 class="section-title">我的歌单</h2>
                <button class="btn-create" id="btn-create-playlist">
                    <span>+</span> 新建歌单
                </button>
            </div>

            <div class="playlists-grid" id="playlists-grid">
                <!-- 动态加载歌单 -->
            </div>
        </section>

        <!-- Music Library -->
        <section class="library-section">
            <div class="section-toolbar">
                <h2 class="section-title">音乐库</h2>
                <button class="btn-scan" id="btn-scan-music">
                    <span>⟳</span> 扫描音乐
                </button>
            </div>

            <div class="music-files" id="music-files">
                <!-- 扫描发现的音乐文件 -->
            </div>
        </section>
    </main>

    <!-- Create Playlist Modal -->
    <div class="modal" id="create-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新建歌单</h3>
                <button class="btn-close" id="btn-close-modal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>歌单名称</label>
                    <input type="text" id="playlist-name" placeholder="输入歌单名称...">
                </div>
                <div class="form-group">
                    <label>描述（可选）</label>
                    <textarea id="playlist-desc" placeholder="描述这个歌单的情绪..."></textarea>
                </div>
                <div class="form-group">
                    <label>封面颜色</label>
                    <div class="color-picker">
                        <button class="color-option" data-color="#6B7A8F" style="background:#6B7A8F"></button>
                        <button class="color-option" data-color="#7A8A9F" style="background:#7A8A9F"></button>
                        <button class="color-option" data-color="#A8B8C9" style="background:#A8B8C9"></button>
                        <button class="color-option" data-color="#C4D4E4" style="background:#C4D4E4"></button>
                        <button class="color-option" data-color="#8B7A7A" style="background:#8B7A7A"></button>
                        <button class="color-option" data-color="#7A8B7A" style="background:#7A8B7A"></button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="btn-cancel">取消</button>
                <button class="btn-confirm" id="btn-confirm-create">创建</button>
            </div>
        </div>
    </div>

    <!-- Playlist Detail Modal -->
    <div class="modal modal-playlist" id="playlist-modal">
        <div class="modal-content playlist-detail">
            <div class="playlist-header" id="playlist-detail-header">
                <button class="btn-back" id="btn-back-playlist">← 返回</button>
                <div class="playlist-info">
                    <h2 id="detail-name">歌单名称</h2>
                    <p id="detail-desc">描述</p>
                </div>
                <div class="playlist-meta">
                    <span id="detail-count">0 首歌曲</span>
                </div>
            </div>
            <div class="playlist-songs" id="playlist-songs">
                <!-- 歌曲列表 -->
            </div>
        </div>
    </div>

    <!-- Add Song Modal -->
    <div class="modal" id="add-song-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加到歌单</h3>
                <button class="btn-close" id="btn-close-add-song">×</button>
            </div>
            <div class="modal-body">
                <p class="song-to-add" id="song-to-add">歌曲名</p>
                <div class="form-group">
                    <label>选择歌单</label>
                    <select id="target-playlist">
                        <!-- 动态加载歌单 -->
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="btn-cancel-add">取消</button>
                <button class="btn-confirm" id="btn-confirm-add">添加</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-message"></span>
    </div>

    <script>
        // API 配置
        const API_BASE = 'http://127.0.0.1:5000/api';

        // 状态管理
        let playlists = [];
        let musicFiles = [];
        let selectedColor = '#A8B8C9';
        let currentPlaylistId = null;
        let songToAdd = null;

        // DOM 元素
        const playlistsGrid = document.getElementById('playlists-grid');
        const musicFilesEl = document.getElementById('music-files');
        const createModal = document.getElementById('create-modal');
        const playlistModal = document.getElementById('playlist-modal');
        const addSongModal = document.getElementById('add-song-modal');
        const toast = document.getElementById('toast');

        // 初始化
        async function init() {
            await loadPlaylists();
            setupEventListeners();
        }

        // 加载歌单
        async function loadPlaylists() {
            try {
                const response = await fetch(`${API_BASE}/playlists`);
                const result = await response.json();
                if (result.success) {
                    playlists = result.data;
                    renderPlaylists();
                }
            } catch (error) {
                console.error('加载歌单失败:', error);
                showToast('无法连接到服务器');
            }
        }

        // 渲染歌单列表
        function renderPlaylists() {
            if (playlists.length === 0) {
                playlistsGrid.innerHTML = `
                    <div class="empty-state">
                        <p>还没有歌单</p>
                        <p class="hint">点击右上角「新建歌单」创建第一个歌单</p>
                    </div>
                `;
                return;
            }

            playlistsGrid.innerHTML = playlists.map(p => `
                <div class="playlist-card" data-id="${p.id}">
                    <div class="playlist-cover" style="background: ${p.cover_color}">
                        <span class="cover-icon">♪</span>
                    </div>
                    <div class="playlist-info">
                        <h3 class="playlist-name">${p.name}</h3>
                        <p class="playlist-desc">${p.description || '暂无描述'}</p>
                        <span class="playlist-count">${p.song_count || 0} 首</span>
                    </div>
                    <div class="playlist-actions">
                        <button class="btn-play-playlist" data-id="${p.id}" title="播放">
                            <span>▶</span>
                        </button>
                        <button class="btn-edit-playlist" data-id="${p.id}" title="编辑">
                            <span>✎</span>
                        </button>
                        <button class="btn-delete-playlist" data-id="${p.id}" title="删除">
                            <span>×</span>
                        </button>
                    </div>
                </div>
            `).join('');

            // 绑定事件
            document.querySelectorAll('.playlist-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (!e.target.closest('.playlist-actions')) {
                        openPlaylistDetail(card.dataset.id);
                    }
                });
            });

            document.querySelectorAll('.btn-play-playlist').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playPlaylist(btn.dataset.id);
                });
            });

            document.querySelectorAll('.btn-edit-playlist').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    editPlaylist(btn.dataset.id);
                });
            });

            document.querySelectorAll('.btn-delete-playlist').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deletePlaylist(btn.dataset.id);
                });
            });
        }

        // 渲染音乐库
        async function loadMusicFiles() {
            try {
                const response = await fetch(`${API_BASE}/songs/scan`, { method: 'POST' });
                const result = await response.json();
                if (result.success) {
                    musicFiles = result.data;
                    renderMusicFiles();
                }
            } catch (error) {
                console.error('扫描音乐失败:', error);
            }
        }

        function renderMusicFiles() {
            if (musicFiles.length === 0) {
                musicFilesEl.innerHTML = `
                    <div class="empty-state">
                        <p>音乐库为空</p>
                        <p class="hint">将音频文件放入 music 文件夹，然后点击「扫描音乐」</p>
                    </div>
                `;
                return;
            }

            musicFilesEl.innerHTML = musicFiles.map((f, i) => `
                <div class="music-file" data-file="${f.file_path}" data-name="${f.name}">
                    <span class="file-icon">♪</span>
                    <span class="file-name">${f.name}</span>
                    <span class="file-size">${formatSize(f.size)}</span>
                    <button class="btn-add-to-playlist" title="添加到歌单">
                        <span>+</span>
                    </button>
                </div>
            `).join('');

            // 绑定添加事件
            document.querySelectorAll('.btn-add-to-playlist').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const fileEl = btn.closest('.music-file');
                    songToAdd = {
                        name: fileEl.dataset.name,
                        file_path: fileEl.dataset.file
                    };
                    openAddSongModal();
                });
            });
        }

        // 打开歌单详情
        async function openPlaylistDetail(playlistId) {
            currentPlaylistId = playlistId;
            try {
                const response = await fetch(`${API_BASE}/playlists/${playlistId}`);
                const result = await response.json();
                if (result.success) {
                    const playlist = result.data;
                    document.getElementById('detail-name').textContent = playlist.name;
                    document.getElementById('detail-desc').textContent = playlist.description || '暂无描述';
                    document.getElementById('detail-count').textContent = `${playlist.songs.length} 首歌曲`;

                    if (playlist.songs.length === 0) {
                        document.getElementById('playlist-songs').innerHTML = `
                            <div class="empty-state">
                                <p>歌单为空</p>
                                <p class="hint">从音乐库添加歌曲到这里</p>
                            </div>
                        `;
                    } else {
                        document.getElementById('playlist-songs').innerHTML = playlist.songs.map((s, i) => `
                            <div class="song-item" data-id="${s.id}">
                                <span class="song-index">${i + 1}</span>
                                <span class="song-name">${s.name}</span>
                                <span class="song-mood">${s.mood}</span>
                                <button class="btn-remove-song" data-id="${s.id}" title="移除">
                                    <span>×</span>
                                </button>
                            </div>
                        `).join('');

                        // 绑定移除事件
                        document.querySelectorAll('.btn-remove-song').forEach(btn => {
                            btn.addEventListener('click', () => removeSongFromPlaylist(btn.dataset.id));
                        });
                    }

                    playlistModal.classList.add('active');
                }
            } catch (error) {
                console.error('加载歌单详情失败:', error);
            }
        }

        // 添加歌曲到歌单
        async function addSongToPlaylist(playlistId) {
            if (!songToAdd) return;

            try {
                const response = await fetch(`${API_BASE}/playlists/${playlistId}/songs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: songToAdd.name,
                        file_path: songToAdd.file_path,
                        mood: 'unknown'
                    })
                });
                const result = await response.json();
                if (result.success) {
                    showToast('已添加到歌单');
                    addSongModal.classList.remove('active');
                    await loadPlaylists();
                }
            } catch (error) {
                console.error('添加歌曲失败:', error);
            }
        }

        // 移除歌曲
        async function removeSongFromPlaylist(songId) {
            try {
                const response = await fetch(`${API_BASE}/songs/${songId}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.success) {
                    showToast('已移除');
                    await openPlaylistDetail(currentPlaylistId);
                    await loadPlaylists();
                }
            } catch (error) {
                console.error('移除歌曲失败:', error);
            }
        }

        // 新建歌单
        async function createPlaylist() {
            const name = document.getElementById('playlist-name').value.trim();
            const desc = document.getElementById('playlist-desc').value.trim();

            if (!name) {
                showToast('请输入歌单名称');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/playlists`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        description: desc,
                        cover_color: selectedColor
                    })
                });
                const result = await response.json();
                if (result.success) {
                    showToast('歌单创建成功');
                    createModal.classList.remove('active');
                    document.getElementById('playlist-name').value = '';
                    document.getElementById('playlist-desc').value = '';
                    await loadPlaylists();
                }
            } catch (error) {
                console.error('创建歌单失败:', error);
            }
        }

        // 删除歌单
        async function deletePlaylist(playlistId) {
            if (!confirm('确定要删除这个歌单吗？')) return;

            try {
                const response = await fetch(`${API_BASE}/playlists/${playlistId}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.success) {
                    showToast('歌单已删除');
                    await loadPlaylists();
                }
            } catch (error) {
                console.error('删除歌单失败:', error);
            }
        }

        // 播放歌单（传递到播放器）
        function playPlaylist(playlistId) {
            // 存储当前歌单ID到sessionStorage
            sessionStorage.setItem('playPlaylistId', playlistId);
            showToast('已在播放器中打开');
            window.location.href = 'player.html';
        }

        // 打开添加歌曲弹窗
        function openAddSongModal() {
            const select = document.getElementById('target-playlist');
            select.innerHTML = playlists.map(p =>
                `<option value="${p.id}">${p.name}</option>`
            ).join('');
            document.getElementById('song-to-add').textContent = songToAdd.name;
            addSongModal.classList.add('active');
        }

        // 工具函数
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function showToast(message) {
            const toastEl = document.getElementById('toast');
            toastEl.querySelector('.toast-message').textContent = message;
            toastEl.classList.add('active');
            setTimeout(() => toastEl.classList.remove('active'), 3000);
        }

        // 事件绑定
        function setupEventListeners() {
            // 新建歌单
            document.getElementById('btn-create-playlist').addEventListener('click', () => {
                createModal.classList.add('active');
            });

            // 关闭弹窗
            document.getElementById('btn-close-modal').addEventListener('click', () => {
                createModal.classList.remove('active');
            });
            document.getElementById('btn-cancel').addEventListener('click', () => {
                createModal.classList.remove('active');
            });
            document.getElementById('btn-confirm-create').addEventListener('click', createPlaylist);

            // 返回歌单列表
            document.getElementById('btn-back-playlist').addEventListener('click', () => {
                playlistModal.classList.remove('active');
            });

            // 添加歌曲弹窗
            document.getElementById('btn-close-add-song').addEventListener('click', () => {
                addSongModal.classList.remove('active');
            });
            document.getElementById('btn-cancel-add').addEventListener('click', () => {
                addSongModal.classList.remove('active');
            });
            document.getElementById('btn-confirm-add').addEventListener('click', () => {
                const playlistId = document.getElementById('target-playlist').value;
                addSongToPlaylist(playlistId);
            });

            // 扫描音乐
            document.getElementById('btn-scan-music').addEventListener('click', loadMusicFiles);

            // 颜色选择
            document.querySelectorAll('.color-option').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedColor = btn.dataset.color;
                    document.querySelectorAll('.color-option').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                });
            });

            // 初始化第一个颜色为选中
            document.querySelector('.color-option').classList.add('selected');

            // 点击弹窗外部关闭
            createModal.addEventListener('click', (e) => {
                if (e.target === createModal) createModal.classList.remove('active');
            });
            playlistModal.addEventListener('click', (e) => {
                if (e.target === playlistModal) playlistModal.classList.remove('active');
            });
            addSongModal.addEventListener('click', (e) => {
                if (e.target === addSongModal) addSongModal.classList.remove('active');
            });
        }

        // 启动
        init();
    </script>
</body>
</html>
